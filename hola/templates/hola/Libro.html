
{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libros</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 40px;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            width: 95%;
            max-width: 900px;
            padding: 25px;
            border-radius: 15px;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        form {
            margin-bottom: 25px;
        }
        .form-horizontal .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
        }
        .form-horizontal .form-group {
            flex: 1 1 45%;
            min-width: 180px;
            display: flex;
            flex-direction: column;
        }
        .form-horizontal label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], input[type="date"], select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }
        button {
            display: block;
            margin: 15px auto 0 auto;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: linear-gradient(135deg, #45a049, #3e8e41);
            transform: scale(1.05);
        }
        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }
        li {
            background-color: #f9f9f9;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid #eee;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
            font-size: 20px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: 3px;
        }
    </style>

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
<body>

<div class="container">
    <h1>📚 Libros</h1>

    {% if es_admin %}
    <h2>Agregar Libro</h2>
    <form method="POST" class="form-horizontal" action="">
        {% csrf_token %}
        <div class="form-row">
            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="error">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
        <button type="submit">Guardar</button>
    </form>
    {% endif %}

    <h2>Buscar libros</h2>
    <form method="get" class="form-horizontal" action="">
