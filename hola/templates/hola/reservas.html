<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva de Libros</title>
<style>
  /* Fondo de biblioteca */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1470&q=80') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Capa oscura sobre el fondo */
  body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    z-index: 0;
  }

  .reserva-container {
    position: relative;
    z-index: 1;
    background-color: rgba(255,255,255,0.95);
    padding: 30px 50px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,0,0,0.7);
    width: 700px;
  }

  h2 {
    text-align: center;
    color: #222;
    margin-bottom: 25px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    font-weight: bold;
    display: block;
    margin-bottom: 8px;
  }

  select, input[type="date"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #333;
    outline: none;
    font-size: 16px;
  }

  select:focus, input:focus {
    border-color: #0066cc;
    box-shadow: 0 0 10px rgba(0,102,204,0.5);
  }

  .btn-group {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
  }

  .btn {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background-color: #0066cc;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    text-align: center;
  }

  .btn:hover {
    background-color: #004a99;
  }

  /* Mensajes centrados */
  .message {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    margin-bottom: 20px;
  }
  .message.success { background-color: #0d6efd; color: white; }
  .message.error { background-color: #dc3545; color: white; }

  @media (max-width: 750px) {
    .reserva-container {
      width: 90%;
      padding: 20px;
    }
    .btn-group {
      flex-direction: column;
    }
    .btn {
      width: 100%;
      margin-bottom: 10px;
    }
  }
</style>
</head>
<body>
  <div class="reserva-container">
    <h2>Reservar Libro</h2>

    <!-- Mensajes -->
    <div style="text-align:center;">
      {% for message in messages %}
        {% if 'reserva' in message.tags %}
          <div class="message {% if 'success' in message.tags %}success{% elif 'error' in message.tags %}error{% endif %}">
            {{ message }}
          </div>
        {% endif %}
      {% endfor %}
    </div>

    <form method="post">
      {% csrf_token %}

      <!-- Usuario -->
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <select name="usuario" id="usuario" required>
          {% for user in usuarios %}
            <option value="{{ user.id }}" {% if user.id == request.user.usuario.id %}selected{% endif %}>
              {{ user.nombre }} {{ user.apellido }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Libro -->
      <div class="form-group">
        <label for="libro">Libro</label>
        <select name="libro" id="libro" required>
          <option value="">Seleccione un libro</option>
          {% for libro in libros %}
            <option value="{{ libro.id }}" data-autor="{{ libro.autor.id }}">
              {{ libro.titulo }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Fechas -->
      <div class="form-group">
        <label for="fecha_inicio">Fecha de inicio</label>
        <input type="date" name="fecha_inicio" id="fecha_inicio" required>
      </div>

      <div class="form-group">
        <label for="fecha_fin">Fecha de fin</label>
        <input type="date" name="fecha_fin" id="fecha_fin" required>
      </div>

      <!-- Botones -->
      <div class="btn-group">
        <button type="submit" class="btn">Reservar</button>
        <a href="{% url 'principal' %}" class="btn">Volver</a>
      </div>
    </form>
  </div>

  <script>
    const libroSelect = document.getElementById('libro');
    const autorSelect = document.getElementById('autor');

    if (libroSelect && autorSelect) {
      libroSelect.addEventListener('change', function() {
        const option = this.selectedOptions[0];
        if(option && option.dataset.autor){
          autorSelect.value = option.dataset.autor;
        } else {
          autorSelect.value = '';
        }
      });
    }
  </script>
</body>
</html>
