{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería de Libros</title>
<style>
  body { 
    font-family: 'Poppins', sans-serif; 
    margin: 0; 
    padding: 0; 
    background: #0f2027; 
    color: #fff; 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh;
  }

  header { 
    text-align: center; 
    padding: 40px 20px; 
    background: linear-gradient(135deg, #6a11cb, #2575fc); 
    box-shadow: 0 4px 25px rgba(0,0,0,0.4);
  }

  header h1 { 
    margin: 0; 
    font-size: 2.5rem; 
  }

  /* Grid 3 filas x 5 columnas */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: 280px; /* contenedor más alto para imágenes grandes */
    gap: 20px;
    margin: 40px;
  }

  .libro-box {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    background: #222;
  }

  .libro-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 12px;
  }

  .libro-box div {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 1rem; /* letra más grande */
    text-align: center;
    padding: 6px 0;
  }

  .libro-box:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  .btn-principal { 
    display: block; 
    margin: 20px auto 40px auto; 
    padding: 12px 25px; 
    background: linear-gradient(135deg, #ff416c, #ff4b2b); 
    color: #fff; 
    border-radius: 30px; 
    font-weight: 600; 
    text-decoration: none; 
    text-align: center; 
    width: 150px; 
    transition: 0.3s; 
  }

  .btn-principal:hover { 
    transform: translateY(-5px); 
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  footer { 
    margin-top: auto; 
    background: linear-gradient(135deg, #2575fc, #6a11cb); 
    text-align: center; 
    padding: 20px; 
    border-top-left-radius: 15px; 
    border-top-right-radius: 15px;
  }

  /* Responsivo para pantallas pequeñas */
  @media (max-width: 1200px) {
    .grid {
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 260px;
    }
  }
  @media (max-width: 900px) {
    .grid {
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 240px;
    }
  }
  @media (max-width: 600px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 220px;
    }
  }
</style>
</head>
